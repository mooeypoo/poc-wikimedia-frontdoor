                $ref: '#/components/schemas/error'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
    servers:
      - url: https://auth.enterprise.wikimedia.com
        description: Authentication API
  /v2/codes:
    summary: Project Codes Available
    description: |
      Lists available project codes (types). Includes project code (type) identifier, name and description.
    get:
      tags:
        - codes
      parameters:
        - in: query
          name: fields
          description: Select which fields to receive in your response, using JSON dot notation.
          schema:
            type: array
            items:
              type: string
              example: name
        - in: query
          name: filters
          description: Select which projects and languages to receive in your response.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/filter'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/code'
            application/x-ndjson:
              schema:
                type: string
                format: ndjson
                example: |
                  {"identifier":"string","name":"string","description":"string"} {"identifier":"string","name":"string","description":"string"}
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            application/x-ndjson:
              schema:
                type: string
                format: ndjson
                example: |
                  {"message":"string","status": 401}
        '403':
