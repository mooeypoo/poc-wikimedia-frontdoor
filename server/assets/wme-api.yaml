          type: boolean
          example: true
          description: Whether the editor has admin status
        is_patroller:
          type: boolean
          example: true
          description: Whether the editor has patroller status
        has_advanced_rights:
          type: boolean
          example: true
          description: Whether the editor has advanced rights
      type: object
    maintenance_tags:
      properties:
        citation_needed_count:
          type: integer
        pov_count:
          type: integer
        clarification_needed_count:
          type: integer
        update_count:
          type: integer
      type: object
    scores:
      properties:
        revertrisk:
          $ref: '#/components/schemas/revertrisk'
        referencerisk:
          $ref: '#/components/schemas/referencerisk'
        referenceneed:
          $ref: '#/components/schemas/referenceneed'
      type: object
    revertrisk:
      properties:
        prediction:
          type: boolean
        probability:
          properties:
            'false':
              type: number
            'true':
              type: number
          type: object
      type: object
    referencerisk:
      properties:
        reference_risk_score:
          type: number
      type: object
    referenceneed:
      properties:
        reference_need_score:
          type: number
      type: object
    event:
      type: object
      properties:
        identifier:
          type: string
          description: A unique identifier for the event.
          example: f7c737db-4b50-4982-8804-7c2b9fa89020
        type:
          type: string
          description: 'The type of event: update, delete, visibility-change.'
          example: update
          enum:
            - update
            - delete
            - visibility-change
        date_created:
          type: string
          description: The date and time when the event was created, in ISO 8601 format.
          example: 2026-03-18T12:38:23.437Z
        date_published:
          type: string
          description: The date and time when the event was published, in ISO 8601 format.
          example: 2026-03-18T12:38:23.437Z
        partition:
          type: integer
          description: The partition number in the event stream.
          example: 42
        offset:
          type: integer
          description: The offset position in the partition for the event.
          example: 3593806
