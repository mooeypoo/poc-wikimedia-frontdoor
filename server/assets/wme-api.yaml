          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            application/x-ndjson:
              schema:
                type: string
                format: ndjson
                example: |
                  {"message":"string","status":500}
      operationId: getCodes
      summary: Project Codes Available
    post:
