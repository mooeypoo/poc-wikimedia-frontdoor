openapi: 3.1.1
externalDocs:
  description: Wikimedia Enterprise API documentation.
  url: https://enterprise.wikimedia.com/docs/
info:
  title: Wikimedia Enterprise API
  version: 2.0.0
  description: |-
    The Wikimedia Enterprise API provides high-volume, read-only access to Wikipedia and other supported Wikimedia projects.

    This single specification covers all Wikimedia Enterprise APIs:

    - **Authentication** (`auth.enterprise.wikimedia.com`) - exchange credentials for JWT access and refresh tokens.
    - **Metadata, Snapshot, On-demand, and Batch** (`api.enterprise.wikimedia.com`) - reference data, bulk downloads, and single-article lookups.
    - **Realtime** (`realtime.enterprise.wikimedia.com`) - streaming article and Wikidata updates.

    All data endpoints are read-only. Most accept either a `GET` request or a `POST` whose JSON body carries `fields`, `filters`, and `limit` to shape the response - the `POST` form never modifies data.

    Authenticated endpoints expect a `Bearer` JWT access token in the `Authorization` header. Content is Wikimedia project text, licensed CC-BY-SA-4.0.
  license:
    name: CC-BY-SA-4.0
    url: https://creativecommons.org/licenses/by-sa/4.0/
  contact:
    name: Commercial Partnerships Division
    url: https://enterprise.wikimedia.com/contact/
  termsOfService: https://enterprise.wikimedia.com/terms/
servers:
  - url: https://api.enterprise.wikimedia.com
    description: Metadata, Snapshot, On-demand, and Batch APIs
  - url: https://auth.enterprise.wikimedia.com
    description: Authentication API
  - url: https://realtime.enterprise.wikimedia.com
    description: Realtime streaming API
security:
  - bearerAuth: []
tags:
  - name: authentication
    description: Login, token refresh/revoke, and password management. Tokens are JWTs.
  - name: codes
    description: Project code metadata.
  - name: languages
    description: Language metadata.
  - name: projects
    description: Project metadata.
  - name: namespaces
    description: Namespace metadata.
  - name: snapshots
    description: Bulk project snapshots (compressed NDJSON) and chunked downloads.
  - name: structured-snapshots
    description: Structured Contents snapshots (Beta).
  - name: articles
    description: On-demand article lookup.
  - name: structured-contents
    description: On-demand Structured Contents article lookup (Beta).
  - name: wikidata
    description: On-demand Wikidata item, property, and label lookup (Beta).
  - name: batches
    description: Hourly batch files of project updates (Realtime Batch).
  - name: realtime-articles
    description: Streaming article updates over SSE / NDJSON.
  - name: realtime-wikidata
    description: Streaming Wikidata updates over SSE / NDJSON (Beta).
x-tagGroups:
  - name: Authentication
    tags:
      - authentication
  - name: Metadata
    tags:
      - codes
      - languages
      - projects
      - namespaces
  - name: Snapshots
    tags:
      - snapshots
      - structured-snapshots
  - name: On-demand
    tags:
      - articles
      - structured-contents
      - wikidata
  - name: Realtime
    tags:
      - batches
      - realtime-articles
      - realtime-wikidata
paths:
  /v1/login:
    summary: Login
    post:
      tags:
        - authentication
      summary: Receive auth tokens in exchange for username and password
      description: Create new access, id, and refresh tokens with your valid username and password.
      operationId: v1-login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  example: j8BDWYrQwDF5u4Yu
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/login'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
    servers:
      - url: https://auth.enterprise.wikimedia.com
        description: Authentication API
  /v1/token-refresh:
    summary: Refresh Token
    post:
      tags:
        - authentication
      summary: Receive auth tokens by providing refresh token
      description: Provides new access and id tokens with your valid username and refresh token.
      operationId: v1-token-refresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: admin
                refresh_token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/refresh-token'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
    servers:
      - url: https://auth.enterprise.wikimedia.com
        description: Authentication API
  /v1/token-revoke:
    summary: Revoke Token
    post:
      tags:
        - authentication
      summary: Revokes all of the access tokens generated by the specified refresh token
      description: Revokes the associated access tokens with your valid refresh token.
      operationId: v1-token-revoke
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
      responses:
        '204':
          description: Token was successfully revoked
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
    servers:
      - url: https://auth.enterprise.wikimedia.com
        description: Authentication API
  /v1/forgot-password:
    summary: Forgot Password
    post:
      tags:
        - authentication
      summary: Initiates forgot password flow for specified user
      description: Sends a confirmation code via email. That code is then required to change user's password using /v1/forgot-password-confirm.
      operationId: v1-forgot-password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: admin
      responses:
        '204':
          description: Confirmation code sent successfully
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
    servers:
      - url: https://auth.enterprise.wikimedia.com
        description: Authentication API
  /v1/forgot-password-confirm:
    summary: Forgot Password Confirmation
    post:
      tags:
        - authentication
      summary: Changes user password as a part of forgot password flow
      description: Changes user password with your valid username, confirmation_code sent to your email from previously hitting /v1/forgot-password endpoint, and new password.
      operationId: v1-forgot-password-confirm
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  example: j8BDWYrQwDF5u4Yu
                confirmation_code:
                  type: string
                  example: 6MadrbRF
      responses:
        '204':
          description: Password reset successfully
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
