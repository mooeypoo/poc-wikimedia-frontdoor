        text:
          type: string
        images:
          type: array
          items:
            $ref: '#/components/schemas/image'
    visibility:
      type: object
      properties:
        comment:
          type: boolean
          example: true
        text:
          type: boolean
          example: true
        editor:
          type: boolean
          example: false
    version:
      properties:
        comment:
          type: string
        editor:
