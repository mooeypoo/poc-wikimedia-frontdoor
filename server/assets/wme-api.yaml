        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
    servers:
      - url: https://auth.enterprise.wikimedia.com
        description: Authentication API
  /v1/change-password:
    summary: Change Password
    post:
      tags:
        - authentication
      summary: Changes user password
      description: |
        Changes user password with your valid access token, current password, and a new proposed password.

        **Note:** This endpoint currently accepts the access token in the request body (`access_token` field) rather than via the `Authorization: Bearer` header. A future API version will align it with the rest of the platform's bearer-auth convention.
      operationId: v1-change-password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                access_token:
                  type: string
                  example: sInR5cCI6IkpXVCJ9eyJhbGciOiJIUzI1NiI
                previous_password:
                  type: string
                  example: j8BDWYrQwDF5u4Yu
                proposed_password:
                  type: string
                  example: b2BDWZrQwDF5u4Yu
      responses:
        '204':
          description: Successful password change
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
    servers:
      - url: https://auth.enterprise.wikimedia.com
        description: Authentication API
  /v1/new-password-required:
    summary: New Password Required
    post:
      tags:
        - authentication
      summary: Respond to new password required challenge
      description: Responds `NEW_PASSWORD_REQUIRED` challenge by receiving username and session token and setting new password.
      operationId: v1-new-password-required
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session:
                  type: string
                  example: eyJhbGcisInR5cCI6IkOiJIUzI1NiIpXVCJ9
                username:
                  type: string
                  example: admin
                new_password:
                  type: string
                  example: b2BDWZrQwDF5u4Yu
      responses:
        '200':
          description: OK
          content:
            application/json:
