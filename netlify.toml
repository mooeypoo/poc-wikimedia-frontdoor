[build]
  command = "npm run build:netlify"
  publish = "dist"
  functions = ".netlify/functions-internal"

[build.environment]
  NODE_VERSION = "22"

# Function bundling is declared in `.netlify/functions-internal/server/server.mjs`
# (`nodeBundler: "none"`). Do not set `node_bundler = "esbuild"` here — it forces a
# CommonJS wrapper that breaks ESM `server.mjs` / `main.mjs` on Netlify Functions 2.0.